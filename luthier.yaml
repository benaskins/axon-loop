name: axon-loop
purpose: Provider-agnostic conversation loop for LLM agents
use_when: LLM conversation needed
deterministic: false
snippet:
  imports:
    - path: github.com/benaskins/axon-loop
      alias: loop
  requires:
    - github.com/benaskins/axon-loop
  deps:
    - axon-talk
    - axon-tool
  setup: |
    _ = loop.RunConfig{
      Client: client,
      Tools:  allTools,
    }
